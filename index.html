<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGV Enterprise Support</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bgv-blue: #003366;
            --bgv-light-blue: #0055a4;
            --bgv-gray: #f4f6f9;
            --bgv-text: #333333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #e9ecef;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Floating Action Button */
        .chat-launcher {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 64px;
            height: 64px;
            background-color: var(--bgv-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.3);
            cursor: pointer;
            z-index: 1050;
            transition: transform 0.3s ease, background-color 0.3s;
            border: 2px solid white;
        }

        .chat-launcher:hover {
            transform: scale(1.1);
            background-color: var(--bgv-light-blue);
        }

        .chat-launcher i {
            font-size: 28px;
        }

        /* Modal Styling */
        .modal-dialog {
            position: fixed;
            bottom: 100px;
            right: 30px;
            margin: 0;
            width: 400px;
            max-width: 90vw;
            height: 600px;
            max-height: 80vh;
        }

        @media (max-width: 576px) {
            .modal-dialog {
                bottom: 0;
                right: 0;
                width: 100%;
                height: 100%;
                max-height: 100vh;
                max-width: 100vw;
            }
            .chat-launcher {
                bottom: 20px;
                right: 20px;
            }
        }

        .modal-content {
            height: 100%;
            border-radius: 16px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            background-color: var(--bgv-blue);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-logo {
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bgv-blue);
            font-weight: bold;
            font-size: 18px;
        }

        .chat-header-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .chat-header-status {
            font-size: 12px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
        }

        /* Header Actions */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
        }

        .header-close-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        /* Chat Body */
        .chat-body {
            background-color: var(--bgv-gray);
            padding: 20px;
            height: calc(100% - 130px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Messages */
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-in-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-bot {
            background-color: white;
            color: var(--bgv-text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .message-user {
            background-color: var(--bgv-blue);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 5px;
            display: block;
            text-align: right;
        }

        /* Waiting Message Styling */
        .waiting-message {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%);
            border-left: 4px solid #f39c12;
            padding: 15px;
            border-radius: 12px;
            margin: 10px 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .waiting-message i {
            color: #f39c12;
            margin-right: 8px;
        }

        /* Email Notification Message */
        .email-notification {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            border-left: 4px solid #28a745;
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 13px;
            color: #155724;
        }

        .email-notification i {
            color: #28a745;
            margin-right: 8px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: white;
            padding: 15px 20px;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .typing-indicator.active {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: #999;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Quick Reply Buttons */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .quick-btn {
            background-color: white;
            border: 1px solid var(--bgv-blue);
            color: var(--bgv-blue);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background-color: var(--bgv-blue);
            color: white;
        }

        /* Footer / Input */
        .chat-footer {
            background-color: white;
            padding: 15px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 24px;
            padding: 10px 20px;
            outline: none;
            font-size: 14px;
        }

        .chat-input:focus {
            border-color: var(--bgv-blue);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bgv-blue);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .send-btn:hover {
            background-color: var(--bgv-light-blue);
        }

        .send-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* End Chat Button */
        .end-chat-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .end-chat-btn:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        .end-chat-btn.active {
            display: flex;
        }

        /* Live Chat Specifics */
        .live-chat-badge {
            background-color: #e74c3c;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            display: none;
        }
        
        .live-chat-badge.active {
            display: inline-block;
        }

        /* Scrollbar */
        .chat-body::-webkit-scrollbar {
            width: 6px;
        }
        .chat-body::-webkit-scrollbar-thumb {
            background-color: #ccc;
            border-radius: 3px;
        }

        /* Live Chat URL Display Styles */
        .live-chat-url-container {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border: 2px solid var(--bgv-blue);
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .live-chat-url-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: var(--bgv-blue);
            font-weight: 600;
            font-size: 14px;
        }

        .live-chat-url-box {
            background: white;
            border: 1px solid #90caf9;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .live-chat-url-text {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--bgv-text);
            word-break: break-all;
            user-select: all;
        }

        .copy-url-btn {
            background: var(--bgv-blue);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .copy-url-btn:hover {
            background: var(--bgv-light-blue);
            transform: scale(1.05);
        }

        .copy-url-btn.copied {
            background: #28a745;
        }

        .live-chat-url-info {
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .share-options {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .share-btn {
            flex: 1;
            background: white;
            border: 1px solid #ddd;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .share-btn:hover {
            background: #f5f5f5;
            border-color: var(--bgv-blue);
            color: var(--bgv-blue);
        }

        .url-qr-code {
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }

        .url-qr-code img {
            max-width: 150px;
            height: auto;
        }
    </style>
</head>
<body>

    <!-- Floating Chat Button -->
    <div class="chat-launcher" onclick="toggleChat()">
        <i class="bi bi-chat-fill"></i>
    </div>

    <!-- Chat Modal -->
    <div class="modal fade" id="bgvChatModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                
                <!-- Header -->
                <div class="chat-header">
                    <div class="chat-header-brand">
                        <div class="chat-header-logo">B</div>
                        <div>
                            <div class="chat-header-title">BGV Support <span class="live-chat-badge" id="liveBadge">LIVE</span></div>
                            <div class="chat-header-status">
                                <span class="status-dot" id="statusDot"></span>
                                <span id="statusText">Online</span>
                            </div>
                        </div>
                    </div>
                    <div class="header-actions">
                        <button class="header-close-btn" onclick="closeChat()" title="Close Chat">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                </div>

                <!-- Body -->
                <div class="chat-body" id="chatBody">
                    <!-- Messages will be injected here -->
                    
                    <!-- Typing Indicator -->
                    <div class="typing-indicator" id="typingIndicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="chat-footer">
                    <input type="text" class="chat-input" id="userInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" id="sendBtn" onclick="handleUserInput()">
                        <i class="bi bi-send-fill"></i>
                    </button>
                    <button class="end-chat-btn" id="endChatBtn" onclick="endLiveChat()">
                        <i class="bi bi-telephone-x-fill"></i>
                        End Chat
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ==========================================
        // CONFIGURATION - UPDATE THESE VALUES
        // ==========================================
        
        const firebaseConfig = {
            apiKey: "AIzaSyAt5Ot23TjRJKH-AKve-_-N2PPYRlrwvak",
            authDomain: "chat-bot-54653.firebaseapp.com",
            projectId: "chat-bot-54653",
            storageBucket: "chat-bot-54653.firebasestorage.app",
            messagingSenderId: "38943109760",
            appId: "1:38943109760:web:5c7277d47189aab137ac65"
        };

        const EMAILJS_CONFIG = {
            serviceID: "service_5nvmfkd",
            templateID: "template_34hdkc2",  // Default template
            publicKey: "bJ-mwYr84eNmVqegR"
        };

        // ==========================================
        // DEPARTMENT EMAIL CONFIGURATION
        // ==========================================
        
        // IMPORTANT: Update these with your actual department emails
        const DEPARTMENT_EMAILS = {
            'Services': 'kovendan16@gmail.com',      // Replace with actual email
            'Support': 'support@bgv.com',        // Replace with actual email
            'Career': 'careers@bgv.com',          // Replace with actual email
            'Live Chat': 'livechat@bgv.com',      // Replace with actual email
            'General': 'info@bgv.com',            // Replace with actual email
            'default': 'kovendan16@gmail.com'     // Fallback email
        };

        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        
        let currentStep = 'GREETING';
        let userData = {
            name: '',
            company: '',
            email: '',
            phone: '',
            interest: '',
            hiringVolume: '',
            verificationType: '',
            supportIssue: '',
            transcript: [],
            emailSent: false,
            emailSentTo: []  // Track which departments were notified
        };
        
        let chatModal;
        let isLiveChat = false;
        let isConnecting = false;
        let peerConnection = null;
        let dataChannel = null;
        let signalingUnsubscribe = null;
        let roomId = null;
        let connectionTimeout = null;
        let liveChatUrl = null;

        // ==========================================
        // INITIALIZATION
        // ==========================================
        
        // Initialize Firebase ONCE
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // Initialize EmailJS
        emailjs.init(EMAILJS_CONFIG.publicKey);

        // ==========================================
        // UI FUNCTIONS
        // ==========================================
        
        function toggleChat() {
            if (!chatModal) {
                chatModal = new bootstrap.Modal(document.getElementById('bgvChatModal'));
            }
            
            const modalEl = document.getElementById('bgvChatModal');
            
            if (modalEl.classList.contains('show')) {
                chatModal.hide();
            } else {
                chatModal.show();
                if (userData.transcript.length === 0) {
                    startConversation();
                }
                setTimeout(() => document.getElementById('userInput').focus(), 500);
            }
        }

        function closeChat() {
            if (isLiveChat && dataChannel && dataChannel.readyState === 'open') {
                if (confirm('You are currently in a live chat session. Are you sure you want to close?')) {
                    endLiveChat();
                    setTimeout(() => {
                        chatModal.hide();
                    }, 500);
                }
            } else {
                chatModal.hide();
            }
        }

        function addMessage(text, sender = 'bot', type = 'text') {
            const chatBody = document.getElementById('chatBody');
            const typingIndicator = document.getElementById('typingIndicator');
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender === 'bot' ? 'message-bot' : 'message-user'}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            if (type === 'buttons') {
                msgDiv.innerHTML = `<div>${text}</div>`;
                chatBody.insertBefore(msgDiv, typingIndicator);
                
                const btnContainer = document.createElement('div');
                btnContainer.className = 'quick-replies';
                btnContainer.id = 'currentQuickReplies';
                chatBody.insertBefore(btnContainer, typingIndicator);
            } else {
                msgDiv.innerHTML = `
                    ${text}
                    <span class="message-time">${time}</span>
                `;
                chatBody.insertBefore(msgDiv, typingIndicator);
            }

            // Add to transcript
            userData.transcript.push({
                sender: sender,
                text: text.replace(/<[^>]*>/g, ''), // Strip HTML for transcript
                time: new Date().toISOString(),
                displayTime: time
            });

            scrollToBottom();
        }

        function addEmailNotificationMessage(department) {
            const chatBody = document.getElementById('chatBody');
            const typingIndicator = document.getElementById('typingIndicator');
            
            const notifDiv = document.createElement('div');
            notifDiv.className = 'email-notification';
            notifDiv.innerHTML = `
                <i class="bi bi-envelope-check-fill"></i>
                <strong>${department} Team Notified!</strong><br>
                <small>An email has been sent to the ${department} department. They will contact you shortly.</small>
            `;
            
            chatBody.insertBefore(notifDiv, typingIndicator);
            scrollToBottom();
        }

        function addWaitingMessage() {
            const chatBody = document.getElementById('chatBody');
            const typingIndicator = document.getElementById('typingIndicator');
            
            const waitingDiv = document.createElement('div');
            waitingDiv.className = 'waiting-message';
            waitingDiv.id = 'waitingMessage';
            waitingDiv.innerHTML = `
                <i class="bi bi-hourglass-split"></i>
                <strong>Connecting to Live Agent...</strong><br>
                <small>Please don't close this chat. We will connect you within 2 minutes.</small>
            `;
            
            chatBody.insertBefore(waitingDiv, typingIndicator);
            scrollToBottom();
        }

        function removeWaitingMessage() {
            const waitingMsg = document.getElementById('waitingMessage');
            if (waitingMsg) {
                waitingMsg.remove();
            }
        }

        function displayLiveChatUrl() {
            const chatBody = document.getElementById('chatBody');
            const typingIndicator = document.getElementById('typingIndicator');
            
            const baseUrl = window.location.origin + window.location.pathname;
            liveChatUrl = `${baseUrl}?room=${roomId}&mode=join`;
            
            const urlContainer = document.createElement('div');
            urlContainer.className = 'live-chat-url-container';
            urlContainer.id = 'liveChatUrlContainer';
            
            urlContainer.innerHTML = `
                <div class="live-chat-url-header">
                    <i class="bi bi-link-45deg"></i>
                    <span>Your Live Chat Session</span>
                </div>
                <div class="live-chat-url-box">
                    <span class="live-chat-url-text" id="chatUrlText">${liveChatUrl}</span>
                    <button class="copy-url-btn" onclick="copyChatUrl()" id="copyUrlBtn">
                        <i class="bi bi-clipboard"></i>
                        <span>Copy</span>
                    </button>
                </div>
                <div class="live-chat-url-info">
                    <i class="bi bi-info-circle-fill"></i>
                    <small>Share this link to invite others to join this chat session</small>
                </div>
                <div class="share-options">
                    <button class="share-btn" onclick="shareViaEmail()">
                        <i class="bi bi-envelope"></i>
                        Email
                    </button>
                    <button class="share-btn" onclick="shareViaWhatsApp()">
                        <i class="bi bi-whatsapp"></i>
                        WhatsApp
                    </button>
                    <button class="share-btn" onclick="openInNewTab()">
                        <i class="bi bi-box-arrow-up-right"></i>
                        Open
                    </button>
                </div>
            `;
            
            chatBody.insertBefore(urlContainer, typingIndicator);
            scrollToBottom();
        }

        function removeLiveChatUrl() {
            const urlContainer = document.getElementById('liveChatUrlContainer');
            if (urlContainer) {
                urlContainer.remove();
            }
        }

        function copyChatUrl() {
            const urlText = document.getElementById('chatUrlText').textContent;
            const copyBtn = document.getElementById('copyUrlBtn');
            
            navigator.clipboard.writeText(urlText).then(() => {
                copyBtn.classList.add('copied');
                copyBtn.innerHTML = '<i class="bi bi-check2"></i><span>Copied!</span>';
                
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = '<i class="bi bi-clipboard"></i><span>Copy</span>';
                }, 2000);
            }).catch(err => {
                const textArea = document.createElement('textarea');
                textArea.value = urlText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                copyBtn.classList.add('copied');
                copyBtn.innerHTML = '<i class="bi bi-check2"></i><span>Copied!</span>';
                
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = '<i class="bi bi-clipboard"></i><span>Copy</span>';
                }, 2000);
            });
        }

        function shareViaEmail() {
            const subject = encodeURIComponent('Join my BGV Support Live Chat');
            const body = encodeURIComponent(`Hello,\n\nI'm currently in a live chat session with BGV Support. Join me using this link:\n\n${liveChatUrl}\n\nBest regards,\n${userData.name || 'BGV User'}`);
            window.open(`mailto:?subject=${subject}&body=${body}`, '_blank');
        }

        function shareViaWhatsApp() {
            const text = encodeURIComponent(`Join my BGV Support live chat: ${liveChatUrl}`);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        function openInNewTab() {
            window.open(liveChatUrl, '_blank');
        }

        function showTyping() {
            document.getElementById('typingIndicator').classList.add('active');
            scrollToBottom();
        }

        function hideTyping() {
            document.getElementById('typingIndicator').classList.remove('active');
        }

        function scrollToBottom() {
            const chatBody = document.getElementById('chatBody');
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function addQuickButtons(options) {
            const container = document.getElementById('currentQuickReplies');
            if(!container) return;
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'quick-btn';
                btn.textContent = opt.label;
                btn.onclick = () => {
                    container.remove();
                    handleQuickReply(opt.value);
                };
                container.appendChild(btn);
            });
        }

        // ==========================================
        // CONVERSATION FLOW
        // ==========================================

        function startConversation() {
            setTimeout(() => {
                addMessage("Hello 👋 Welcome to BGV SecureCheck.");
                setTimeout(() => {
                    addMessage("We provide secure and compliance-driven Background Verification services.");
                    setTimeout(() => {
                        addMessage("Before we proceed, may I have your name?");
                        currentStep = 'COLLECT_NAME';
                    }, 800);
                }, 1000);
            }, 600);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') handleUserInput();
        }

        function handleUserInput() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            
            processUserInput(text);
        }

        function handleQuickReply(value) {
            addMessage(value, 'user');
            processUserInput(value);
        }

        function processUserInput(text) {
            showTyping();

            if (isLiveChat && dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(JSON.stringify({type: 'chat', text: text}));
                hideTyping();
                return;
            }

            setTimeout(() => {
                hideTyping();
                
                switch(currentStep) {
                    case 'COLLECT_NAME':
                        userData.name = text;
                        addMessage(`Nice to meet you, ${text}. What is your company name?`);
                        currentStep = 'COLLECT_COMPANY';
                        break;
                    
                    case 'COLLECT_COMPANY':
                        userData.company = text;
                        addMessage("Got it. Please provide your official email address.");
                        currentStep = 'COLLECT_EMAIL';
                        break;

                    case 'COLLECT_EMAIL':
                        if (!validateEmail(text)) {
                            addMessage("Please enter a valid email address.");
                            return;
                        }
                        userData.email = text;
                        addMessage("Thank you. Finally, your phone number?");
                        currentStep = 'COLLECT_PHONE';
                        break;

                    case 'COLLECT_PHONE':
                        userData.phone = text;
                        showMainMenu();
                        break;

                    case 'MENU':
                        handleMenuSelection(text);
                        break;
                    
                    case 'SERVICES_VOLUME':
                        userData.hiringVolume = text;
                        addMessage("What type of verification do you require?", 'bot', 'buttons');
                        addQuickButtons([
                            { label: 'Criminal Verification', value: 'Criminal Verification' },
                            { label: 'Employment Verification', value: 'Employment Verification' },
                            { label: 'Education Verification', value: 'Education Verification' },
                            { label: 'Address Verification', value: 'Address Verification' },
                            { label: 'Bulk Hiring BGV', value: 'Bulk Hiring BGV' }
                        ]);
                        currentStep = 'SERVICES_TYPE';
                        break;
                    
                    case 'SERVICES_TYPE':
                        userData.verificationType = text;
                        addMessage("Thank you for the details. Our sales team will contact you shortly.");
                        // Send email to Services department
                        sendDepartmentEmail('Services');
                        setTimeout(showMainMenu, 3000);
                        break;

                    case 'SUPPORT_FLOW':
                        handleSupportFlow(text);
                        break;

                    default:
                        addMessage("I'm sorry, I didn't understand that.");
                }
            }, 500);
        }

        function showMainMenu() {
            currentStep = 'MENU';
            addMessage(`Thank you ${userData.name}. What are you looking for today?`, 'bot', 'buttons');
            addQuickButtons([
                { label: 'Services', value: 'Services' },
                { label: 'Career', value: 'Career' },
                { label: 'Support', value: 'Support' },
                { label: 'Connect to Live Team', value: 'Live Chat' }
            ]);
        }

        function handleMenuSelection(selection) {
            const lower = selection.toLowerCase();
            
            if (lower.includes('service')) {
                userData.interest = 'Services';
                currentStep = 'SERVICES_VOLUME';
                addMessage("Excellent. What is your monthly hiring volume?");
            } else if (lower.includes('career')) {
                userData.interest = 'Career';
                addMessage("You can view our open positions here:");
                addMessage("<a href='https://yourcompany.com/careers' target='_blank'>https://yourcompany.com/careers</a>");
                // Send email to Career department
                sendDepartmentEmail('Career');
                addEmailNotificationMessage('Career');
                setTimeout(showMainMenu, 4000);
            } else if (lower.includes('support')) {
                userData.interest = 'Support';
                currentStep = 'SUPPORT_FLOW';
                addMessage("I understand you need support. What is the issue type?", 'bot', 'buttons');
                addQuickButtons([
                    { label: 'Login Issue', value: 'Login' },
                    { label: 'Report Download', value: 'Download' },
                    { label: 'Verification Status', value: 'Status' },
                    { label: 'Payment Issue', value: 'Payment' }
                ]);
            } else if (lower.includes('live')) {
                userData.interest = 'Live Chat';
                initiateLiveChat();
            } else {
                addMessage("Please select a valid option.");
                showMainMenu();
            }
        }

        function handleSupportFlow(issue) {
            userData.supportIssue = issue;
            addMessage(`Noted: ${issue} issue. Connecting you to a specialist...`);
            // Send email to Support department immediately
            sendDepartmentEmail('Support');
            addEmailNotificationMessage('Support');
            initiateLiveChat();
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // ==========================================
        // EMAIL NOTIFICATION SYSTEM
        // ==========================================

        /**
         * Send email notification to specific department
         * This is the key function that routes emails to correct departments
         */
        function sendDepartmentEmail(department) {
            // Check if already sent to this department in this session
            if (userData.emailSentTo.includes(department)) {
                console.log(`Email already sent to ${department} department`);
                return Promise.resolve();
            }

            const targetEmail = DEPARTMENT_EMAILS[department] || DEPARTMENT_EMAILS['default'];
            
            // Prepare comprehensive email parameters
            const templateParams = {
                // Recipient - THIS IS THE KEY VARIABLE
                to_email: targetEmail,
                
                // Sender info
                from_name: userData.name || 'Anonymous User',
                from_email: userData.email || 'no-reply@bgv.com',
                reply_to: userData.email || 'no-reply@bgv.com',
                
                // Company info
                company_name: userData.company || 'Not provided',
                phone_number: userData.phone || 'Not provided',
                
                // Department and priority
                department: department,
                priority: getPriorityLevel(department),
                
                // Specific details based on department
                interest_area: userData.interest || 'General Inquiry',
                hiring_volume: userData.hiringVolume || 'N/A',
                verification_type: userData.verificationType || 'N/A',
                support_issue: userData.supportIssue || 'N/A',
                
                // Chat context
                conversation_id: roomId || `CONV_${Date.now()}`,
                chat_transcript: formatTranscriptForEmail(),
                chat_url: liveChatUrl || 'N/A',
                
                // Metadata
                timestamp: new Date().toLocaleString(),
                user_agent: navigator.userAgent,
                page_url: window.location.href
            };

            console.log(`📧 Sending ${department} notification to:`, targetEmail);
            console.log('📧 Template params:', templateParams);

            return emailjs.send(EMAILJS_CONFIG.serviceID, EMAILJS_CONFIG.templateID, templateParams)
                .then((response) => {
                    console.log(`✅ ${department} email sent successfully:`, response.status);
                    
                    // Track that we sent to this department
                    userData.emailSentTo.push(department);
                    
                    // Show confirmation in chat
                    if (department !== 'Services') {
                        addMessage(`✅ ${department} team has been notified and will contact you at ${userData.email}.`, 'bot');
                    }
                    
                    return response;
                })
                .catch((error) => {
                    console.error(`❌ Failed to send ${department} email:`, error);
                    
                    // Fallback: try sending to default email
                    if (targetEmail !== DEPARTMENT_EMAILS['default']) {
                        console.log('🔄 Attempting fallback to default email...');
                        return sendFallbackEmail(department, templateParams);
                    }
                    
                    addMessage(`⚠️ Unable to notify ${department} team automatically. Please contact us directly.`, 'bot');
                    throw error;
                });
        }

        /**
         * Fallback email sender if department email fails
         */
        function sendFallbackEmail(originalDepartment, originalParams) {
            const fallbackParams = {
                ...originalParams,
                to_email: DEPARTMENT_EMAILS['default'],
                original_intended_department: originalDepartment,
                fallback_notice: `This email was originally intended for ${originalDepartment} department but was sent to default due to delivery failure.`
            };

            return emailjs.send(EMAILJS_CONFIG.serviceID, EMAILJS_CONFIG.templateID, fallbackParams)
                .then((response) => {
                    console.log('✅ Fallback email sent successfully');
                    addMessage(`✅ Notification sent to support team. They will route your request to the ${originalDepartment} department.`, 'bot');
                    return response;
                })
                .catch((error) => {
                    console.error('❌ Fallback email also failed:', error);
                    addMessage("⚠️ Email notification system is currently unavailable. Please save this conversation and contact us directly.", 'bot');
                    throw error;
                });
        }

        /**
         * Determine priority level based on department
         */
        function getPriorityLevel(department) {
            const priorityMap = {
                'Live Chat': 'URGENT',
                'Support': 'HIGH',
                'Services': 'MEDIUM',
                'Career': 'LOW',
                'General': 'NORMAL'
            };
            return priorityMap[department] || 'NORMAL';
        }

        /**
         * Format chat transcript for email
         */
        function formatTranscriptForEmail() {
            if (!userData.transcript || userData.transcript.length === 0) {
                return 'No conversation history available.';
            }

            const header = `=== BGV Chat Transcript ===\n`;
            const metadata = `User: ${userData.name} | Company: ${userData.company} | Email: ${userData.email}\n`;
            const separator = `------------------------\n`;
            
            const messages = userData.transcript.map(msg => {
                const time = msg.displayTime || new Date(msg.time).toLocaleTimeString();
                const sender = msg.sender === 'bot' ? 'BGV Bot' : msg.sender === 'user' ? userData.name : 'System';
                return `[${time}] ${sender}: ${msg.text}`;
            }).join('\n');

            return header + metadata + separator + messages;
        }

        // ==========================================
        // WEBRTC LIVE CHAT SYSTEM
        // ==========================================

        async function initiateLiveChat() {
            isConnecting = true;
            
            addWaitingMessage();
            
            document.getElementById('statusText').textContent = "Connecting...";
            document.getElementById('statusDot').style.backgroundColor = "#f1c40f";

            isLiveChat = true;
            
            // Generate unique room ID
            roomId = 'room_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            
            // Display shareable URL
            displayLiveChatUrl();
            
            // Notify Live Chat department
            sendDepartmentEmail('Live Chat').catch(err => {
                console.log('Live chat notification failed, but continuing with connection...');
            });

            // WebRTC Configuration
            const configuration = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ],
                iceCandidatePoolSize: 10
            };
            
            peerConnection = new RTCPeerConnection(configuration);
            
            peerConnection.oniceconnectionstatechange = () => {
                console.log('ICE Connection State:', peerConnection.iceConnectionState);
                if (peerConnection.iceConnectionState === 'failed') {
                    handleConnectionFailure();
                } else if (peerConnection.iceConnectionState === 'disconnected') {
                    setTimeout(() => {
                        if (peerConnection.iceConnectionState === 'disconnected') {
                            handleConnectionFailure();
                        }
                    }, 5000);
                }
            };

            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'failed') {
                    handleConnectionFailure();
                }
            };
            
            dataChannel = peerConnection.createDataChannel("chat", { 
                ordered: true,
                maxRetransmits: 3
            });
            setupDataChannel();

            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    db.collection('rooms').doc(roomId).collection('callerCandidates').add({
                        candidate: event.candidate.toJSON(),
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }).catch(err => console.error('Error adding candidate:', err));
                }
            };

            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                // Create room in Firestore
                const roomRef = db.collection('rooms').doc(roomId);
                await roomRef.set({
                    offer: {
                        type: offer.type,
                        sdp: offer.sdp
                    },
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'waiting',
                    userInfo: {
                        name: userData.name,
                        email: userData.email,
                        company: userData.company,
                        issue: userData.supportIssue || 'General',
                        department: 'Live Chat'
                    }
                });

                // Listen for answer from agent
                signalingUnsubscribe = roomRef.onSnapshot(async (doc) => {
                    const data = doc.data();
                    if (!data) return;
                    
                    if (data.answer && !peerConnection.currentRemoteDescription) {
                        try {
                            const rtcSessionDescription = new RTCSessionDescription(data.answer);
                            await peerConnection.setRemoteDescription(rtcSessionDescription);
                        } catch (err) {
                            console.error('Error setting remote description:', err);
                        }
                    }
                });

                // Listen for callee candidates
                const calleeCandidatesUnsubscribe = roomRef.collection('calleeCandidates').onSnapshot((snapshot) => {
                    snapshot.docChanges().forEach(async (change) => {
                        if (change.type === 'added') {
                            const candidateData = change.doc.data();
                            if (peerConnection.remoteDescription) {
                                try {
                                    await peerConnection.addIceCandidate(new RTCIceCandidate(candidateData.candidate));
                                } catch (e) {
                                    console.error('Error adding ICE candidate:', e);
                                }
                            }
                        }
                    });
                });

                window.calleeCandidatesUnsubscribe = calleeCandidatesUnsubscribe;

                // 2-minute connection timeout
                connectionTimeout = setTimeout(() => {
                    if (isConnecting && (!dataChannel || dataChannel.readyState !== 'open')) {
                        handleConnectionTimeout();
                    }
                }, 120000);

            } catch (error) {
                console.error('Error initiating live chat:', error);
                handleConnectionFailure();
            }
        }

        function handleConnectionTimeout() {
            removeWaitingMessage();
            removeLiveChatUrl();
            addMessage("We couldn't establish a live connection at this moment. Our team has been notified and will contact you shortly.", 'bot');
            
            // Ensure support email was sent
            if (!userData.emailSentTo.includes('Support')) {
                sendDepartmentEmail('Support');
            }
            
            cleanupConnection();
            setTimeout(showMainMenu, 3000);
        }

        function handleConnectionFailure() {
            if (!isConnecting) return;
            removeWaitingMessage();
            removeLiveChatUrl();
            addMessage("Connection failed. Please check your network or try again later.", 'bot');
            cleanupConnection();
            setTimeout(showMainMenu, 3000);
        }

        function setupDataChannel() {
            dataChannel.onopen = () => {
                console.log("Data Channel Opened");
                isConnecting = false;
                if (connectionTimeout) {
                    clearTimeout(connectionTimeout);
                    connectionTimeout = null;
                }
                
                // Update room status
                if (roomId) {
                    db.collection('rooms').doc(roomId).update({
                        status: 'connected',
                        connectedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }).catch(err => console.error('Error updating room status:', err));
                }
                
                removeWaitingMessage();
                document.getElementById('endChatBtn').classList.add('active');
                document.getElementById('liveBadge').classList.add('active');
                document.getElementById('statusText').textContent = "Connected to Live Agent";
                document.getElementById('statusDot').style.backgroundColor = "#2ecc71";
                
                updateLiveChatUrlStatus('connected');
                addMessage("✅ You are now connected to a live verification specialist. How can we help you today?", 'bot');
            };

            dataChannel.onclose = () => {
                console.log("Data Channel Closed");
                if (isLiveChat) {
                    addMessage("🔴 Live chat session ended by agent.", 'bot');
                    endLiveChat();
                }
            };

            dataChannel.onerror = (error) => {
                console.error("Data Channel Error:", error);
                addMessage("⚠️ Connection error occurred.", 'bot');
            };

            dataChannel.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'chat') {
                        addMessage(data.text, 'bot');
                    } else if (data.type === 'system') {
                        addMessage(data.text, 'bot');
                    }
                } catch (e) {
                    addMessage(event.data, 'bot');
                }
            };
        }

        function updateLiveChatUrlStatus(status) {
            const container = document.getElementById('liveChatUrlContainer');
            if (!container) return;
            
            const header = container.querySelector('.live-chat-url-header');
            if (status === 'connected') {
                header.innerHTML = '<i class="bi bi-check-circle-fill" style="color: #28a745;"></i><span>Live Chat Active - Share this link</span>';
                container.style.background = 'linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%)';
                container.style.borderColor = '#28a745';
            }
        }

        function endLiveChat() {
            // Close data channel
            if (dataChannel) {
                try {
                    dataChannel.close();
                } catch (e) {}
                dataChannel = null;
            }
            
            // Close peer connection
            if (peerConnection) {
                try {
                    peerConnection.close();
                } catch (e) {}
                peerConnection = null;
            }
            
            // Unsubscribe from signaling
            if (signalingUnsubscribe) {
                signalingUnsubscribe();
                signalingUnsubscribe = null;
            }
            
            if (window.calleeCandidatesUnsubscribe) {
                window.calleeCandidatesUnsubscribe();
                window.calleeCandidatesUnsubscribe = null;
            }
            
            // Clear timeout
            if (connectionTimeout) {
                clearTimeout(connectionTimeout);
                connectionTimeout = null;
            }
            
            // Update room status
            if (roomId) {
                db.collection('rooms').doc(roomId).update({
                    status: 'ended',
                    endedAt: firebase.firestore.FieldValue.serverTimestamp()
                }).catch(err => console.error('Error updating room status:', err));
            }
            
            removeWaitingMessage();
            removeLiveChatUrl();
            resetConnectionUI();
            
            addMessage("Chat ended. Thank you for contacting BGV Support.", 'bot');
            
            setTimeout(showMainMenu, 2000);
        }

        function cleanupConnection() {
            isLiveChat = false;
            isConnecting = false;
            
            if (connectionTimeout) {
                clearTimeout(connectionTimeout);
                connectionTimeout = null;
            }
            
            if (dataChannel) {
                try { dataChannel.close(); } catch (e) {}
                dataChannel = null;
            }
            
            if (peerConnection) {
                try { peerConnection.close(); } catch (e) {}
                peerConnection = null;
            }
            
            if (signalingUnsubscribe) {
                signalingUnsubscribe();
                signalingUnsubscribe = null;
            }
            
            if (window.calleeCandidatesUnsubscribe) {
                window.calleeCandidatesUnsubscribe();
                window.calleeCandidatesUnsubscribe = null;
            }
            
            roomId = null;
            liveChatUrl = null;
        }

        function resetConnectionUI() {
            isLiveChat = false;
            isConnecting = false;
            
            document.getElementById('endChatBtn').classList.remove('active');
            document.getElementById('liveBadge').classList.remove('active');
            document.getElementById('statusText').textContent = "Online";
            document.getElementById('statusDot').style.backgroundColor = "#2ecc71";
        }

        // ==========================================
        // UTILITY & INITIALIZATION
        // ==========================================

            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            const modeParam = urlParams.get('mode');
            
            if (roomParam && modeParam === 'join') {
                console.log('Joining room:', roomParam);
                // Implement agent join logic here
            }
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (isLiveChat) {
                endLiveChat();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkForExistingRoom();
        });

    </script>
